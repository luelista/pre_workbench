<head>

	<link type="text/css" rel="stylesheet" href="node_modules/golden-layout/src/css/goldenlayout-base.css" />

			jquery: { exports: '$' },
			jqueryui: ['jquery'],
			dragevent: ['jquery'],
			slickcore: ['jqueryui'],
			slickgrid: {
				deps: ['slickcore', 'dragevent'],

		require(['vs/editor/editor.main', './main', 'jquery', 'golden-layout'], function(editor_main, main, rpc) {
